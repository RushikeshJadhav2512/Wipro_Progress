<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Smart City Citizen Portal</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <!--BOOTSTrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!--External CSS-->
    <link rel="stylesheet" href="style.css" />

</head>

<body>
    <header class="bg-dark text-white p-3">
        <nav class="container d-flex justify-content-between align-items-center">
            <h3>SmartCity</h3>
            <ul class="nav">
                <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#services">Services</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#request">Request</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#status">Status</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <!--Hero Section-->
        <section id="home" class="hero d-flex align-items-center justify-content-center text-center">
            <div>
                <h1>Welcome to Smart City Services</h1>
                <p>One portal for all citizen needs</p>
                <button class="btn btn-primary" onclick="scrollToForm()">Raise Request</button>
            </div>
        </section>
        <!--Services-->
        <section id="services" class="container my-5">
            <h2 class="text-center mb-4">City Services</h2>
            <div class="row" id="serviceCards"></div>
        </section>
        <!--Request Form-->
        <section id="request" class="container my-5">
            <h2>Service Request</h2>
            <form id="requestForm" class="card p-4">
                <input class="form-control mb-2" id="name" placeholder="Name" />
                <input class="form-control mb-2" id="email" placeholder="Email" />
                <select class="form-control mb-2" id="serviceType">
                    <option value="">Select Service</option>
                    <option>Garbage Collection</option>
                    <option>Water Supply</option>
                    <option>Road Repair</option>
                </select>
                <textarea class="form-control mb-2" id="description" placeholder="Description"></textarea>
                <p id="errorMsg" class="rext-danger"></p>
                <button class="btn btn-success">Submit</button>
            </form>
        </section>
        <!--Status-->
        <section id="status" class="" container my-5>
            <h2>Request Status</h2>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Service</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="requestTable"></tbody>

            </table>
        </section>
        <!--Fetch Data-->
        <section class="container my-5">
            <h2>Service Announcements</h2>
            <ul id="announcementList"></ul>
        </section>
    </main>
    <footer class="bg-dark text-white text-center p-2">
        @2026 Smart City Portal
    </footer>
</body>

</html>
